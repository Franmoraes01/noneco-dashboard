<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NONECO Logistics · SPA1 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #edeae3;
  --border: #d8d4ca;
  --accent: #1a3a2a;
  --accent2: #c8601a;
  --text: #1a1a18;
  --muted: #6b6860;
  --ok: #1a6b3a;
  --ok-bg: #e8f5ed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 0;
}
header {
  background: var(--accent);
  color: #fff;
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.logo-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.logo-sub {
  font-size: 10px;
  opacity: 0.6;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  opacity: 0.85;
  letter-spacing: 0.06em;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #5dca90;
  animation: pulse 2s ease-in-out infinite;
}
.countdown-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  opacity: 0.85;
}
.ring-container { position: relative; width: 30px; height: 30px; }
.ring-container svg { transform: rotate(-90deg); }
#ring-fill { transition: stroke-dashoffset 1s linear; }
#ring-num {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 9px; font-weight: 500; color: #fff;
}
.btn-refresh {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.2s;
}
.btn-refresh:hover { background: rgba(255,255,255,0.2); }
.last-update {
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 0.04em;
}

main { padding: 1.75rem 2rem; max-width: 1400px; margin: 0 auto; }

/* Loading */
#loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 1rem;
}
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
#loading p { font-size: 13px; color: var(--muted); }

/* Error */
#error-bar {
  display: none;
  background: #fef3ee;
  border: 1px solid #f0c8a8;
  border-radius: 6px;
  padding: 10px 16px;
  font-size: 12px;
  color: #8b3a0f;
  margin-bottom: 1.25rem;
}

/* KPI grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 1.5rem;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  animation: fadeUp 0.4s ease both;
}
.kpi-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.kpi-value {
  font-family: 'Fraunces', serif;
  font-size: 1.75rem;
  font-weight: 600;
  line-height: 1;
  color: var(--accent);
}
.kpi-card.accent2 .kpi-value { color: var(--accent2); }

/* Charts */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 1.5rem;
}
@media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
  animation: fadeUp 0.5s ease both;
}
.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.chart-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
select.metric-sel {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  color: var(--text);
  cursor: pointer;
}
.chart-wrap { position: relative; height: 240px; }

/* Table */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  animation: fadeUp 0.6s ease both;
}
.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.table-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.table-meta { font-size: 11px; color: var(--muted); }
.table-scroll { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  table-layout: fixed;
}
th {
  background: var(--bg);
  padding: 8px 12px;
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--surface2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* Footer */
footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-title">NONECO Logistics</div>
    <div class="logo-sub">SPA1 · Operations Dashboard</div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="countdown-wrap">
      <div class="ring-container">
        <svg width="30" height="30" viewBox="0 0 30 30">
          <circle cx="15" cy="15" r="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/>
          <circle id="ring-fill" cx="15" cy="15" r="12" fill="none" stroke="#5dca90" stroke-width="2.5"
            stroke-dasharray="75.4" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <span id="ring-num">60</span>
      </div>
      próxima atualização
    </div>
    <button class="btn-refresh" onclick="triggerRefresh()">↻ Atualizar</button>
    <div class="last-update" id="last-update"></div>
  </div>
</header>

<main>
  <div id="error-bar"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando dados da planilha...</p>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="kpi-grid" id="kpi-grid"></div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title" id="chart1-title">Distribuição</span>
          <select class="metric-sel" id="metric-sel1" onchange="redrawCharts()"></select>
        </div>
        <div class="chart-wrap"><canvas id="chart1"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title" id="chart2-title">Evolução</span>
          <select class="metric-sel" id="metric-sel2" onchange="redrawCharts()"></select>
        </div>
        <div class="chart-wrap"><canvas id="chart2"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <span class="table-title">Dados recentes</span>
        <span class="table-meta" id="table-meta"></span>
      </div>
      <div class="table-scroll">
        <table id="data-table"></table>
      </div>
    </div>
  </div>
</main>

<footer>NONECO Logistics · SPA1 · atualização automática a cada 60 segundos · dados via Google Sheets</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVjQO7uFumTuhJTaDFtWZbW3cFC-1isW5rEKjKcZRhK5lYmLv75Io2_l3fmhEx3CjNp7LduqQE78dg/pub?gid=0&single=true&output=csv';

let headers = [], rows = [], c1, c2, secs = 60, timer;

function startTimer() {
  clearInterval(timer);
  secs = 60;
  updateRing();
  timer = setInterval(() => {
    secs--;
    updateRing();
    if (secs <= 0) triggerRefresh();
  }, 1000);
}

function updateRing() {
  const circ = 75.4;
  document.getElementById('ring-fill').style.strokeDashoffset = circ * (1 - secs / 60);
  document.getElementById('ring-num').textContent = secs;
  document.getElementById('ring-fill').style.stroke = secs > 15 ? '#5dca90' : '#f0a060';
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  const sep = lines[0].includes(';') ? ';' : lines[0].includes('\t') ? '\t' : ',';
  headers = lines[0].split(sep).map(h => h.replace(/^"|"$/g, '').trim());
  rows = lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === sep && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r => r.some(c => c));
}

function numCols() {
  return headers.filter(h => {
    const idx = headers.indexOf(h);
    return rows.slice(0, 20).some(r => {
      const v = (r[idx] || '').replace(/,/g, '.');
      return v !== '' && !isNaN(parseFloat(v));
    });
  });
}

function dateCol() {
  return headers.find(h => /(date|data|fecha|dt|time|hora)/i.test(h));
}

function catCol(nums, datec) {
  return headers.find(h => h !== datec && !nums.includes(h));
}

function buildKPIs(nums) {
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = '';
  nums.slice(0, 4).forEach((col, i) => {
    const idx = headers.indexOf(col);
    const vals = rows.map(r => parseFloat((r[idx] || '0').replace(/,/g, '.'))).filter(v => !isNaN(v));
    const total = vals.reduce((a, b) => a + b, 0);
    const card = document.createElement('div');
    card.className = 'kpi-card' + (i === 1 ? ' accent2' : '');
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `<div class="kpi-label">${col} — total</div><div class="kpi-value">${total.toLocaleString('pt-BR', {maximumFractionDigits: 1})}</div>`;
    grid.appendChild(card);
  });
  const extra = [
    { label: 'Registros', val: rows.length.toLocaleString('pt-BR') },
    { label: 'Colunas', val: headers.length }
  ];
  extra.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'kpi-card';
    card.style.animationDelay = ((nums.slice(0,4).length + i) * 0.05) + 's';
    card.innerHTML = `<div class="kpi-label">${e.label}</div><div class="kpi-value">${e.val}</div>`;
    grid.appendChild(card);
  });
}

function fillSelects(nums) {
  ['metric-sel1', 'metric-sel2'].forEach((id, si) => {
    const sel = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = '';
    nums.forEach((col, i) => {
      const o = document.createElement('option');
      o.value = col; o.textContent = col;
      if (col === prev || (!prev && i === si)) o.selected = true;
      sel.appendChild(o);
    });
  });
}

function redrawCharts() {
  const nums = numCols();
  const dc = dateCol();
  const cc = catCol(nums, dc);
  const col1 = document.getElementById('metric-sel1').value || nums[0];
  const col2 = document.getElementById('metric-sel2').value || (nums[1] || nums[0]);
  if (c1) c1.destroy();
  if (c2) c2.destroy();

  const palette1 = ['#1a3a2a','#2d6045','#4a9068','#7bbf98','#b0d9c0','#d5ecdf','#e8f5ed'];
  const palette2 = '#c8601a';

  // Chart 1 — category bar
  if (cc) {
    const catIdx = headers.indexOf(cc);
    const colIdx = headers.indexOf(col1);
    const groups = {};
    rows.forEach(r => {
      const k = (r[catIdx] || 'N/A').substring(0, 28);
      const v = parseFloat((r[colIdx] || '0').replace(/,/g, '.'));
      groups[k] = (groups[k] || 0) + (isNaN(v) ? 0 : v);
    });
    const sorted = Object.entries(groups).sort((a, b) => b[1] - a[1]).slice(0, 10);
    document.getElementById('chart1-title').textContent = `${col1} por ${cc}`;
    c1 = new Chart(document.getElementById('chart1'), {
      type: 'bar',
      data: {
        labels: sorted.map(e => e[0]),
        datasets: [{ label: col1, data: sorted.map(e => Math.round(e[1] * 100) / 100),
          backgroundColor: sorted.map((_, i) => palette1[i % palette1.length]),
          borderRadius: 4, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { family: 'DM Mono', size: 10 }, maxRotation: 40, autoSkip: false }, grid: { display: false } },
          y: { ticks: { font: { family: 'DM Mono', size: 10 } }, grid: { color: '#edeae3' } }
        }
      }
    });
  }

  // Chart 2 — time series or top
  if (dc) {
    const dIdx = headers.indexOf(dc);
    const colIdx = headers.indexOf(col2);
    const byDate = {};
    rows.forEach(r => {
      const dk = (r[dIdx] || '').substring(0, 10);
      const v = parseFloat((r[colIdx] || '0').replace(/,/g, '.'));
      byDate[dk] = (byDate[dk] || 0) + (isNaN(v) ? 0 : v);
    });
    const sorted = Object.entries(byDate).filter(e => e[0]).sort((a, b) => a[0].localeCompare(b[0])).slice(0, 40);
    document.getElementById('chart2-title').textContent = `${col2} ao longo do tempo`;
    c2 = new Chart(document.getElementById('chart2'), {
      type: 'line',
      data: {
        labels: sorted.map(e => e[0]),
        datasets: [{ label: col2, data: sorted.map(e => Math.round(e[1] * 100) / 100),
          borderColor: palette2, backgroundColor: 'rgba(200,96,26,0.07)',
          tension: 0.4, pointRadius: 2, pointBackgroundColor: palette2, fill: true }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { family: 'DM Mono', size: 9 }, maxRotation: 40, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } },
          y: { ticks: { font: { family: 'DM Mono', size: 10 } }, grid: { color: '#edeae3' } }
        }
      }
    });
  } else {
    const colIdx = headers.indexOf(col2);
    const top = rows.slice(0, 20);
    document.getElementById('chart2-title').textContent = `${col2} — top 20 registros`;
    c2 = new Chart(document.getElementById('chart2'), {
      type: 'bar',
      data: {
        labels: top.map((_, i) => i + 1),
        datasets: [{ label: col2, data: top.map(r => { const v = parseFloat((r[colIdx] || '0').replace(/,/g, '.')); return isNaN(v) ? 0 : Math.round(v * 100) / 100; }),
          backgroundColor: palette2, borderRadius: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { family: 'DM Mono', size: 10 } }, grid: { display: false } },
          y: { ticks: { font: { family: 'DM Mono', size: 10 } }, grid: { color: '#edeae3' } }
        }
      }
    });
  }
}

function buildTable() {
  const maxCols = Math.min(headers.length, 8);
  const colW = Math.floor(100 / maxCols) + '%';
  let html = `<colgroup>${headers.slice(0, maxCols).map(() => `<col style="width:${colW}">`).join('')}</colgroup>`;
  html += `<thead><tr>${headers.slice(0, maxCols).map(h => `<th title="${h}">${h}</th>`).join('')}</tr></thead>`;
  html += `<tbody>${rows.slice(0, 10).map(r => `<tr>${r.slice(0, maxCols).map(c => `<td title="${c || ''}">${c || '—'}</td>`).join('')}</tr>`).join('')}</tbody>`;
  document.getElementById('data-table').innerHTML = html;
  document.getElementById('table-meta').textContent = `${rows.length} registros · mostrando 10`;
}

async function triggerRefresh() {
  startTimer();
  const eb = document.getElementById('error-bar');
  eb.style.display = 'none';
  try {
    const res = await fetch(CSV_URL + '&_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if (!text || text.length < 20) throw new Error('Resposta vazia ou inválida');
    parseCSV(text);
    const nums = numCols();
    if (!nums.length) throw new Error('Nenhuma coluna numérica encontrada');
    buildKPIs(nums);
    fillSelects(nums);
    buildTable();
    redrawCharts();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const now = new Date();
    document.getElementById('last-update').textContent =
      `atualizado às ${now.toLocaleTimeString('pt-BR')}`;
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    eb.style.display = 'block';
    eb.textContent = `Erro ao carregar dados: ${err.message}. Próxima tentativa em ${secs}s.`;
  }
}

triggerRefresh();
</script>
</body>
</html>
